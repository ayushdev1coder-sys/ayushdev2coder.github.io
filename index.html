<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Upload Hub</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    font-size:40px;
}

.upload-box{
    background:#1e1e1e;
    padding:30px;
    border-radius:20px;
    margin-top:20px;
}

input{
    margin-top:15px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#00bfff;
    color:white;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
}

button:hover{
    background:#0095cc;
}

.file-card{
    background:#222;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
    word-break:break-word;
    transition:0.3s;
}

.file-link{
    color:#00bfff;
    display:block;
    margin-top:10px;
}

.copy-btn{
    background:#28a745;
}

.copy-btn:hover{
    background:#1f8337;
}

.master-mode{
    border:2px solid red;
    cursor:pointer;
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>File Upload Hub</h1>

    <div class="upload-box">
        <input type="file" id="fileInput">
        <br>
        <button onclick="uploadFile()">Upload File</button>
    </div>

    <div id="files"></div>
</div>

<script>

/* =========================
   MASTER CODE
========================= */

const MASTER_CODE = "AYUSH123";

/* =========================
   STORAGE
========================= */

let uploadedFiles =
JSON.parse(localStorage.getItem("uploadedFiles")) || [];

let masterMode = false;

/* =========================
   RENDER FILES
========================= */

function renderFiles(){

    const filesDiv = document.getElementById("files");

    filesDiv.innerHTML = "";

    uploadedFiles.forEach((file, index)=>{

        filesDiv.innerHTML += `
        <div class="file-card ${masterMode ? 'master-mode' : ''}"
             onclick="${masterMode ? `masterDelete(${index})` : ''}">

            <h3>${file.name}</h3>

            <a class="file-link"
               href="${file.url}"
               target="_blank">

               Open File

            </a>

            <button class="copy-btn"
                    onclick="event.stopPropagation(); copyLink('${file.url}')">

                Copy Link

            </button>

            <button onclick="event.stopPropagation(); deleteFile(${index})">

                Delete File

            </button>

        </div>
        `;
    });
}

/* =========================
   UPLOAD
========================= */

function uploadFile(){

    const input = document.getElementById("fileInput");

    const file = input.files[0];

    if(!file){

        alert("Select a file first");

        return;
    }

    const deletePassword =
    prompt("Create a delete password for this file:");

    if(!deletePassword){

        alert("Password required");

        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const fileData = {

            name:file.name,
            url:e.target.result,
            password:deletePassword

        };

        uploadedFiles.push(fileData);

        localStorage.setItem(
            "uploadedFiles",
            JSON.stringify(uploadedFiles)
        );

        renderFiles();

        alert("File uploaded!");
    };

    reader.readAsDataURL(file);
}

/* =========================
   NORMAL DELETE
========================= */

function deleteFile(index){

    const enteredPassword =
    prompt("Enter delete password:");

    if(enteredPassword === uploadedFiles[index].password){

        uploadedFiles.splice(index, 1);

        localStorage.setItem(
            "uploadedFiles",
            JSON.stringify(uploadedFiles)
        );

        renderFiles();

        alert("File deleted!");

    }else{

        alert("Wrong password!");
    }
}

/* =========================
   COPY LINK
========================= */

function copyLink(link){

    navigator.clipboard.writeText(link);

    alert("Link copied!");
}

/* =========================
   CTRL + Q MASTER MODE
========================= */

document.addEventListener("keydown", function(event){

    if(event.ctrlKey && event.key.toLowerCase() === "q"){

        event.preventDefault();

        const enteredCode =
        prompt("Enter Master Code:");

        if(enteredCode === MASTER_CODE){

            masterMode = !masterMode;

            renderFiles();

            if(masterMode){

                alert(
                    "MASTER MODE ENABLED\n\nClick any file card to delete it instantly."
                );

            }else{

                alert("MASTER MODE DISABLED");
            }

        }else{

            alert("Wrong Master Code!");
        }
    }
});

/* =========================
   MASTER DELETE
========================= */

function masterDelete(index){

    const sure = confirm(
        "Delete this file with MASTER CODE?"
    );

    if(sure){

        uploadedFiles.splice(index, 1);

        localStorage.setItem(
            "uploadedFiles",
            JSON.stringify(uploadedFiles)
        );

        renderFiles();

        alert("File deleted instantly!");
    }
}

/* =========================
   START
========================= */

renderFiles();

</script>

</body>
</html>
